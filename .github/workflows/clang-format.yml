name: Clang Format

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    container:
      image: docker.io/hualet/deepin:25-builder
      options: --privileged
    
    steps:
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y clang-format git
    
    - uses: actions/checkout@v4
    
    - name: Check clang-format version
      run: clang-format --version
    
    - name: Check formatting
      run: |
        find . -name "*.cpp" -o -name "*.h" | xargs clang-format -style=gnu -i
        git config --global --add safe.directory $(pwd)
        git diff --exit-code || (echo "Please run clang-format to fix formatting issues" && exit 1)
